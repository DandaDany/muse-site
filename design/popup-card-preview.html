<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>影城資訊卡 · 資料驅動預覽</title>
<style>
  :root {
    --orange: #e8793a; --orange-strong: #ef6b22;
    --green: #173f2f; --green-dark: #113326;
    --black: #262823; --paper: #fffdf8; --line: #e8ded2;
    --page-bg:#dfe4e0; --page-fg:#25302a;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--page-bg); color:var(--page-fg);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; }
  .wrap { max-width:1400px; margin:0 auto; padding:32px 24px 60px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .lede { color:#5c6660; font-size:14px; margin:0 0 26px; max-width:70ch; line-height:1.6; }
  .row { display:flex; gap:40px; flex-wrap:wrap; align-items:flex-start; }
  .cell-label { font-size:12px; font-weight:700; color:#5c6660; margin:0 0 12px; }

  /* ===== popup 尺寸包裝：整張卡 scale(0.5) → 427×418，Leaflet 會用這個尺寸量測 ===== */
  .scale-wrap { width:427px; height:418px; overflow:hidden; border-radius:9px;
    box-shadow:0 16px 40px rgba(30,25,18,.28); }
  .movie-card { transform:scale(.5); transform-origin:top left; }

  /* ===== 以下卡片幾何 = 已定稿版本（854×836），未改 ===== */
  .movie-card {
    position:relative; width:854px; height:836px; border-radius:18px;
    overflow:hidden; background:var(--paper); isolation:isolate;
  }
  .movie-card::after { content:""; position:absolute; left:0; right:0; bottom:0;
    height:24px; background:var(--orange-strong);
    clip-path:polygon(0 100%, 100% 0, 100% 100%); z-index:80; }
  .base-cream { position:absolute; left:0; top:130px; width:100%; height:550px;
    background:#fdf4e4; z-index:1; }
  .geometry-svg { position:absolute; inset:0; width:854px; height:836px; display:block; z-index:10; pointer-events:none; }
  .shape-white-main { fill:#fff; } .shape-dark { fill:#242823; } .shape-orange-line { fill:var(--orange-strong); }

  .hero-content { position:absolute; top:58px; left:44px; z-index:30; color:#fff; max-width:470px; }
  .hero-title { margin:0 0 22px; font-size:39px; font-weight:900; letter-spacing:.03em;
    line-height:1.08; text-shadow:0 2px 8px rgba(0,0,0,.24); }
  .hero-address { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:800;
    line-height:1.2; color:rgba(255,255,255,.93); }
  .hero-address svg { width:17px; height:23px; color:#fff; flex:0 0 auto; }

  .close-hit { position:absolute; top:26px; right:27px; z-index:85; width:52px; height:52px;
    border:0; border-radius:50%; background:rgba(255,255,255,.22); color:#fff; cursor:pointer;
    display:grid; place-items:center; }

  .date-panel { position:absolute; left:0; top:235px; width:262px; height:432px;
    background:#fff3df; clip-path:polygon(0 0, 100% 0, 78% 100%, 0 89%); z-index:9; }
  .date-content { position:absolute; top:261px; left:44px; z-index:45; }
  .calendar-box { width:58px; height:58px; border-radius:6px; background:var(--orange);
    display:grid; place-items:center; color:#fff; margin-bottom:25px;
    box-shadow:0 8px 20px rgba(209,100,44,.22); }
  .date-label { color:var(--orange); font-size:25px; line-height:1; font-weight:900; margin-bottom:13px; }
  .date-value { color:#202520; font-size:24px; line-height:1; font-weight:900; }

  /* ===== 時間表：動態列數 + 可捲動（吃資料就靠這個） ===== */
  .msched { position:absolute; top:264px; left:282px; width:525px; height:372px;
    overflow-y:auto; z-index:50; }
  .mrow { position:relative; display:flex; align-items:center; height:60px; padding-left:34px; gap:22px; }
  .mrow::before { content:""; position:absolute; left:7px; top:0; bottom:0; width:4px; background:var(--orange); }
  .mrow:first-child::before { top:30px; } .mrow:last-child::before { bottom:30px; }
  .mrow::after { content:""; position:absolute; left:0; top:30px; margin-top:-9px;
    width:18px; height:18px; border-radius:50%; background:var(--orange); }
  .mtime { flex:0 0 auto; width:112px; font-size:39px; font-weight:950; line-height:1;
    color:#1a211e; font-variant-numeric:tabular-nums; }
  .mdetail { flex:1; min-width:0; height:100%; display:flex; align-items:center;
    border-bottom:1px dashed var(--line); font-size:15px; font-weight:800; color:#737873;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mrow:last-child .mdetail { border-bottom:0; }

  .footer-white { position:absolute; right:0; bottom:13px; width:445px; height:105px; background:#fff;
    clip-path:polygon(7% 0, 100% 0, 100% 100%, 0 100%); z-index:60;
    filter:drop-shadow(0 -3px 4px rgba(0,0,0,.32)) drop-shadow(-3px 0 3px rgba(0,0,0,.2)); }
  .footer-green { position:absolute; left:0; bottom:0; width:425px; height:187px;
    background:linear-gradient(135deg,var(--green),var(--green-dark)); clip-path:polygon(0 0, 100% 40%, 93% 100%, 0 100%); z-index:61; }
  .entry-button, .site-button { position:absolute; bottom:37px; z-index:70; display:flex; align-items:center; gap:16px;
    font-size:32px; font-weight:900; letter-spacing:.06em; text-decoration:none; }
  .entry-button { left:39px; color:#fff; }
  .site-button { right:52px; bottom:38px; color:var(--green); }
  .entry-button .arrow { color:#fff; } .site-button .arrow { color:var(--orange); }
  .arrow { font-weight:300; font-size:38px; margin-left:6px; }

  /* 照片佔位（真接 app.js 時改成 品牌 logo + 橘色濾鏡） */
  .photo-fill { fill:#c96a2e; }
  .photo-label { fill:#f6d3b4; font-family:Arial, sans-serif; font-weight:700; letter-spacing:1px; }
  svg { display:block; }
</style>
</head>
<body>
<div class="wrap">
  <h1>影城資訊卡 · 資料驅動預覽（popup 尺寸 427px）</h1>
  <p class="lede">整張卡 <code>scale(0.5)</code> 縮到 popup 尺寸；時間表改成<strong>動態列數＋可捲動</strong>（第三張 30 場請往下滑）。補充字過長會自動<strong>…截斷</strong>。照片先用色塊佔位，接 app.js 時換品牌 logo。這份能過，我就把同一套搬進 <code>web/app.js</code> / <code>styles.css</code> 再上線。</p>
  <div class="row" id="cards"></div>
</div>

<script>
  const PIN = '<svg viewBox="0 0 24 32" fill="none"><path d="M12 31S22 19.6 22 11.5C22 5.15 17.52 1 12 1S2 5.15 2 11.5C2 19.6 12 31 12 31Z" fill="currentColor"/><circle cx="12" cy="11.5" r="3.4" fill="#1b211d"/></svg>';
  const CAL = '<svg width="31" height="31" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2.2"/><path d="M8 3v4M16 3v4M3 10h18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>';
  const TICKET = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M4 8.5V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2.5a2.5 2.5 0 0 0 0 5V16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2.5a2.5 2.5 0 0 0 0-5Z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/></svg>';
  const GLOBE = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.1"/><path d="M3 12h18M12 3c2.25 2.45 3.25 5.45 3.25 9S14.25 18.55 12 21M12 3C9.75 5.45 8.75 8.45 8.75 12S9.75 18.55 12 21" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/></svg>';
  const X = '<svg width="20" height="20" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg>';
  const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  // 對應 geojson feature.properties 的樣板
  function cardHtml(p) {
    const date = (p.show_date||'').replaceAll('-','/');
    const rows = (p.showtimes||[]).map(s => {
      const detail = s.auditorium ? `${s.format} ／ ${s.auditorium}` : s.format;
      return `<div class="mrow"><span class="mtime">${esc(s.time)}</span><span class="mdetail">${esc(detail)}</span></div>`;
    }).join('');
    return `<div class="scale-wrap"><article class="movie-card">
      <div class="base-cream"></div>
      <svg class="geometry-svg" viewBox="0 0 854 836" preserveAspectRatio="none" aria-hidden="true">
        <defs><clipPath id="pc"><polygon points="609,0 854,0 854,205 550,150"/></clipPath></defs>
        <polygon class="shape-white-main" points="270,250 854,225 854,745 410,745 270,690"/>
        <polygon class="shape-dark" points="0,0 609,0 550,150 0,228"/>
        <g clip-path="url(#pc)"><rect class="photo-fill" x="545" y="0" width="309" height="245"/>
          <text class="photo-label" x="790" y="135" text-anchor="end" font-size="26">${esc(p.chain_name||'')}</text></g>
        <polygon class="shape-orange-line" points="0,226 550,150 0,241"/>
      </svg>
      <button class="close-hit" aria-label="關閉">${X}</button>
      <div class="hero-content">
        <h2 class="hero-title">${esc(p.location_name)}</h2>
        <div class="hero-address">${PIN}<span>${esc(p.address)}</span></div>
      </div>
      <div class="date-panel"></div>
      <div class="date-content">
        <div class="calendar-box">${CAL}</div>
        <div class="date-label">當日,</div>
        <div class="date-value">${esc(date)}</div>
      </div>
      <section class="msched">${rows}</section>
      <div class="footer-green"></div>
      <div class="footer-white"></div>
      <a class="entry-button" href="${esc(p.location_url)||'#'}" target="_blank" rel="noreferrer">${TICKET}<span>場次入口</span><span class="arrow">→</span></a>
      <a class="site-button" href="${esc(p.official_url)||'#'}" target="_blank" rel="noreferrer">${GLOBE}<span>官方網站</span><span class="arrow">→</span></a>
    </article></div>`;
  }

  const V=(n)=>`（數位·${n%2?'英文':'中文'}版）玩具總動員 5${n%2?'':'（中）'}`;
  const H=(n)=>n%2?'3廳　207席':'5廳　217席';
  const samples = [
    { label:'7 場・有廳席（國賓）', p:{ chain_name:'AMBASSADOR', location_name:'高雄義大國賓影城', address:'高雄市大樹區學城路一段12號3樓', show_date:'2026-07-03', location_url:'#', official_url:'#',
        showtimes:[13,14,15,16,17,18,19].map((h,i)=>({time:`${h}:${i%2?'40':'30'}`, format:V(i), auditorium:H(i)})) }},
    { label:'3 場・無廳席（威秀，降級）', p:{ chain_name:'VIESHOW', location_name:'京站威秀影城', address:'台北市大同區承德路一段1號10樓', show_date:'2026-07-03', location_url:'#', official_url:'#',
        showtimes:[{time:'10:45',format:'（數位·國語版）玩具總動員 5',auditorium:null},{time:'13:20',format:'（IMAX·國語版）玩具總動員 5',auditorium:null},{time:'16:10',format:'（數位·英語版）玩具總動員 5',auditorium:null}] }},
    { label:'30 場・測捲動（秀泰）', p:{ chain_name:'SHOWTIMES', location_name:'台中站前秀泰影城', address:'台中市東區南京路76號', show_date:'2026-07-03', location_url:'#', official_url:'#',
        showtimes:Array.from({length:30},(_,i)=>({time:`${9+Math.floor(i/2)}:${i%2?'50':'20'}`, format:V(i), auditorium:i%3?H(i):null})) }},
  ];
  document.getElementById('cards').innerHTML = samples.map(s =>
    `<div><p class="cell-label">${s.label}</p>${cardHtml(s.p)}</div>`).join('');
</script>
</body>
</html>
