name: Backend chain location counts (diagnostic)

# 診斷用：只向後台拉影城主檔，印出每個品牌的 active 據點數，
# 用來確認「哪些影城後台沒有據點」。不跑爬蟲，約 1 分鐘。
# 手動觸發：Actions → Backend chain location counts → Run workflow。

on:
  workflow_dispatch:

jobs:
  counts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Taipei
      MUSE_API_BASE_URL: ${{ secrets.MUSE_API_BASE_URL }}
      MUSE_API_TOKEN: ${{ secrets.MUSE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull cinema master from backend
        run: python scripts/pull_cinema_master.py

      - name: Print per-chain active location counts
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          import sys
          sys.path.insert(0, "scripts")
          from init_db import DEFAULT_DB_PATH

          con = sqlite3.connect(str(DEFAULT_DB_PATH))
          con.row_factory = sqlite3.Row
          rows = con.execute(
              """
              SELECT cc.chain_name,
                     COUNT(cl.id) AS total,
                     COALESCE(SUM(CASE WHEN cl.active = 1 THEN 1 ELSE 0 END), 0) AS active
              FROM cinema_chains cc
              LEFT JOIN cinema_locations cl ON cl.chain_id = cc.id
              GROUP BY cc.id, cc.chain_name
              ORDER BY active ASC, cc.chain_name
              """
          ).fetchall()

          print("=" * 52)
          print(f"{'品牌':<26} {'active':>6} {'total':>6}")
          print("-" * 52)
          zero = []
          for r in rows:
              mark = "  ← 無 active 據點" if r["active"] == 0 else ""
              print(f"{r['chain_name']:<26} {r['active']:>6} {r['total']:>6}{mark}")
              if r["active"] == 0:
                  zero.append(r["chain_name"])
          print("=" * 52)
          print(f"品牌總數={len(rows)}；active 據點為 0 的品牌數={len(zero)}")
          if zero:
              print("無 active 據點的品牌：" + "、".join(zero))
          PY