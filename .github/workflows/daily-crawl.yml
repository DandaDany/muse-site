name: Daily crawl and publish map

# 雲端排程爬蟲（取代本機工作排程器 / 更新地圖.bat）。
# 流程：向後台拉最新片單 → 爬 30+ 家影城場次 → 匯出 GeoJSON → 推回 main →
#       部署公開地圖（deploy-pages job）→ 回報執行摘要給後台儀表板。
#
# 為何自己部署 Pages 而非靠 pages.yml：用內建 GITHUB_TOKEN 推的 commit「不會」觸發
# 其他 workflow（GitHub 防遞迴機制），所以 crawl job 推的地圖資料收不到 pages.yml。
# 因此本 workflow 直接以 deploy-pages job 發佈 web/，確保排程更新一定會上線。
#
# 前置需求：
#   後台是影城主檔與片單的單一真相來源。在 repo → Settings → Secrets and variables →
#   Actions 設定兩個 Secret（缺一不可）：
#     - MUSE_API_BASE_URL：後台網址，例如 https://muse-backend-xxxx.onrender.com
#     - MUSE_API_TOKEN   ：與後台 CRAWLER_API_TOKEN 相同的字串
#   且後台 Postgres 需已灌入含 source_location_code 的影城主檔（在本機對 Render 跑過
#   `python manage.py import_from_sqlite`）。本 workflow 每次爬蟲前會呼叫後台
#   /api/cinema-master/ 重建本機 SQLite，因此「不需」把 binary DB 提交進 repo。
#
# 注意：GitHub 只會從「預設分支（main）」觸發 schedule；本 workflow 合併進 main 後排程才會生效。

on:
  schedule:
    # 每天台灣時間 07:00（UTC+8）＝ 前一天 UTC 23:00。
    # GitHub cron 一律用 UTC，且尖峰時段實際觸發可能延遲數分鐘。
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "場次日期 YYYY-MM-DD（留空＝台灣時區的今天）"
        required: false
        default: ""

# 允許 workflow 用內建 GITHUB_TOKEN 把更新後的地圖資料推回 repo。
permissions:
  contents: write

# 同一時間只跑一個爬蟲，避免手動觸發與排程重疊。
concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # 讓 date.today() 與 log 以台灣時區為準。
      TZ: Asia/Taipei
      # 後台連線（必要）：拉片單與影城主檔、回報摘要都靠這兩個。缺少時「Build cinema master DB」步驟會直接失敗。
      MUSE_API_BASE_URL: ${{ secrets.MUSE_API_BASE_URL }}
      MUSE_API_TOKEN: ${{ secrets.MUSE_API_TOKEN }}
      MUSE_WORKER_NAME: github-actions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium and system deps
        run: python -m playwright install --with-deps chromium

      - name: Install Xvfb (headful browser for 威秀 VIESHOW)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Build cinema master DB from backend
        # 向後台 /api/cinema-master/ 拉影城品牌＋據點（含 source_location_code），
        # 在乾淨環境重建 data/movie_map.sqlite。--require-codes：若後台完全沒有據點代碼
        # 直接失敗，避免爬出空地圖。威秀/百老匯/小型影城的代碼由後台 build.sh 從版控
        # CSV 自動同步（import_cinema_csv），故後台已含這些代碼。
        run: python scripts/pull_cinema_master.py --require-codes

      - name: Overlay version-controlled cinema codes and verify Shin Kong
        # 後台還沒部署最新主檔時，使用 repo 的自然鍵 CSV 補齊代碼。這只會
        # 更新既存據點的非空欄位，保留後台地址、座標與 URL，也不會建立幽靈據點。
        run: |
          python scripts/import_cinema_sources.py data/input/cinema_codes.csv --overlay-existing --chain "新光影城" --require-existing
          python scripts/verify_cinema_codes.py --csv data/input/cinema_codes.csv --chain "新光影城"

      - name: Refresh scraped-chain location codes (新光/in89/國賓/秀泰/美麗新)
        # 需要 source_location_code 的 7 家中，威秀/百老匯是靜態（後台已存）；其餘 5 家
        # 的代碼是從官網即時爬（非靜態），故在此補進上一步建好的 SQLite：
        #   新光=skcinemas、in89、國賓=ambassador、秀泰=showtimes、美麗新=misc(MIRANEW)。
        # 秀泰/美麗新用 API 的 corporation_id/CinemaId 比對本機代碼，漏爬就整家 0 筆。
        # upsert 皆座標安全（只補代碼）。新光走 playwright、官網偶爾逾時，故重試一次。
        # 任一家暫時抓不到不中斷排程（容錯）——缺的代碼會由後台既存值補上（見下一步回寫）。
        run: |
          curl -L -o /dev/null -sS --connect-timeout 15 --max-time 90 \
            -w 'SKCINEMAS curl http=%{http_code} ip=%{remote_ip} dns=%{time_namelookup} connect=%{time_connect} tls=%{time_appconnect} ttfb=%{time_starttransfer} total=%{time_total}\n' \
            'https://www.skcinemas.com/films?c=1001' || echo 'SKCINEMAS curl failed (continuing to browser diagnostics)'
          # 新光需在 Actions 用 headed Chromium 與 Xvfb 攔截官方 API。版控 CSV
          # 已先驗證可作備援，若即時刷新兩次都失敗，記錄明確警告後仍讓每日場次
          # crawler 執行；後者會以 failed source 回報 partial_success，絕不假裝 0 筆成功。
          if ! (xvfb-run -a --server-args="-screen 0 1366x900x24" \
              python scripts/fetch_skcinemas_locations.py --headed || \
              xvfb-run -a --server-args="-screen 0 1366x900x24" \
              python scripts/fetch_skcinemas_locations.py --headed); then
            echo "::warning::新光即時據點刷新失敗；將使用已驗證的版控代碼，並由場次來源回報最終狀態。"
          fi
          python scripts/fetch_in89_locations.py || true
          python scripts/fetch_ambassador_locations.py || true
          python scripts/fetch_showtimes_locations.py || true
          python scripts/fetch_misc_locations.py || true

      - name: Persist scraped codes back to backend
        # 把即時爬到的代碼 POST 回後台持久化，讓後台累積成完整單一來源；
        # 之後某天官網逾時，pull_cinema_master 仍能從後台取得上次存好的代碼。
        continue-on-error: true
        run: python scripts/push_cinema_codes.py

      - name: Run daily crawl (headful via Xvfb)
        env:
          SKCINEMAS_HEADLESS: "false"
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          # --no-git：git 操作交給下一步統一處理，只提交地圖資料、不提交每日變動的 SQLite。
          # 部分影城（威秀）需 headful 瀏覽器，透過 Xvfb 提供虛擬顯示器。
          xvfb-run -a --server-args="-screen 0 1366x900x24" \
            python scripts/daily_update.py --no-git $DATE_ARG

      - name: Commit and push updated map data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 只提交公開地圖資料與片單；每次爬蟲產生的場次會弄髒 SQLite，但不提交（保持主檔乾淨）。
          git add web/data/locations.geojson 電影清單.txt
          if git diff --cached --quiet; then
            echo "地圖資料無變動，無須發佈。"
          else
            git commit -m "Update map data (scheduled crawl)"
            git push
          fi

  # 部署公開地圖到 GitHub Pages。獨立 job：crawl 用 GITHUB_TOKEN 推的 commit 不會
  # 觸發 pages.yml，故在此直接發佈 web/（checkout main 取 crawl 剛推上的新 geojson）。
  deploy-pages:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # 與 pages.yml 共用同一並發群組，避免兩者同時部署 Pages 衝突。
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (含 crawl 剛推上的最新地圖資料)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
