name: Daily crawl and publish map

# 雲端排程爬蟲（取代本機工作排程器 / 更新地圖.bat）。
# 流程：向後台拉最新片單 → 爬 30+ 家影城場次 → 匯出 GeoJSON → 推回 main →
#       觸發 pages.yml 部署公開地圖 → 回報執行摘要給後台儀表板。
#
# 前置需求（只需各做一次）：
#   1) 影城主檔 DB 已進版控：本機執行過一次爬蟲後，把 data/movie_map.sqlite 提交進 repo。
#      （.gitignore 已放行此檔；沒有它，爬蟲不知道要爬哪些影城／據點代碼。）
#   2) 若要連後台（拉即時片單＋回報結果）：在 repo → Settings → Secrets and variables →
#      Actions 設定 MUSE_API_BASE_URL 與 MUSE_API_TOKEN（MUSE_API_TOKEN 需與後台 CRAWLER_API_TOKEN 相同）。
#      未設定時 = 純 repo 模式：用 repo 內的《電影清單.txt》當片單，不拉即時片單也不回報。
#
# 注意：GitHub 只會從「預設分支（main）」觸發 schedule；本 workflow 合併進 main 後排程才會生效。

on:
  schedule:
    # 每天台灣時間 07:00（UTC+8）＝ 前一天 UTC 23:00。
    # GitHub cron 一律用 UTC，且尖峰時段實際觸發可能延遲數分鐘。
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "場次日期 YYYY-MM-DD（留空＝台灣時區的今天）"
        required: false
        default: ""

# 允許 workflow 用內建 GITHUB_TOKEN 把更新後的地圖資料推回 repo。
permissions:
  contents: write

# 同一時間只跑一個爬蟲，避免手動觸發與排程重疊。
concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # 讓 date.today() 與 log 以台灣時區為準。
      TZ: Asia/Taipei
      # 後台連線（未設 Secret 時為空字串 = 純 repo 模式，daily_update.py 會自動退回《電影清單.txt》）。
      MUSE_API_BASE_URL: ${{ secrets.MUSE_API_BASE_URL }}
      MUSE_API_TOKEN: ${{ secrets.MUSE_API_TOKEN }}
      MUSE_WORKER_NAME: github-actions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium and system deps
        run: python -m playwright install --with-deps chromium

      - name: Install Xvfb (headful browser for 威秀 VIESHOW)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Verify cinema master DB is committed
        run: |
          if [ ! -f data/movie_map.sqlite ]; then
            echo "::error::找不到 data/movie_map.sqlite（影城主檔）。請先在本機執行一次爬蟲產生此檔並提交進 repo，詳見 docs/scheduled_update.md。"
            exit 1
          fi

      - name: Run daily crawl (headful via Xvfb)
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          # --no-git：git 操作交給下一步統一處理，只提交地圖資料、不提交每日變動的 SQLite。
          # 部分影城（威秀）需 headful 瀏覽器，透過 Xvfb 提供虛擬顯示器。
          xvfb-run -a --server-args="-screen 0 1366x900x24" \
            python scripts/daily_update.py --no-git $DATE_ARG

      - name: Commit and push updated map data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 只提交公開地圖資料與片單；每次爬蟲產生的場次會弄髒 SQLite，但不提交（保持主檔乾淨）。
          git add web/data/locations.geojson 電影清單.txt
          if git diff --cached --quiet; then
            echo "地圖資料無變動，無須發佈。"
          else
            git commit -m "Update map data (scheduled crawl)"
            git push
          fi
