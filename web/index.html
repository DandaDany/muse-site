<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>木棉花電影全台上映地圖</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="影城篩選">
        <header class="panel-head">
          <div>
            <h1>木棉花電影全台上映地圖</h1>
            <p id="summaryText">載入中</p>
          </div>
          <button class="icon-button" id="resetViewButton" type="button" title="回到台灣視角" aria-label="回到台灣視角">
            ⌂
          </button>
        </header>

        <label class="field">
          <span>電影</span>
          <select id="movieSelect" aria-label="選擇電影"></select>
        </label>

        <label class="field">
          <span>搜尋</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="影城、品牌、縣市" aria-controls="searchSuggestions" />
        </label>
        <div id="searchSuggestions" class="search-suggestions" hidden></div>

        <section class="filter-block" aria-label="底圖樣式">
          <div class="filter-head">
            <span>底圖</span>
          </div>
          <div class="basemap-list" id="basemapList"></div>
        </section>

        <section class="filter-block" aria-label="品牌篩選">
          <div class="filter-head">
            <span>品牌</span>
            <button class="filter-reset" id="clearChainButton" type="button">全部品牌</button>
          </div>
          <div class="filter-scroll" id="chainFilterList"></div>
        </section>

        <section class="filter-block" aria-label="縣市篩選">
          <div class="filter-head">
            <span>縣市</span>
            <button class="filter-reset" id="clearCityButton" type="button">全部縣市</button>
          </div>
          <div class="filter-scroll" id="cityFilterList"></div>
        </section>

        <div class="stats-grid" aria-label="統計">
          <div>
            <strong id="visibleCount">0</strong>
            <span>顯示</span>
          </div>
          <div>
            <strong id="totalCount">0</strong>
            <span>總點位</span>
          </div>
        </div>
      </aside>

      <section class="map-wrap" aria-label="台灣影城地圖">
        <div id="map"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
