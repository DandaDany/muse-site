# Render Blueprint：一鍵部署 muse-site 後台（控制面）
#
# 用法：在 Render 儀表板 → New → Blueprint → 連接本 GitHub repo，選這個檔即可。
# 會建立：一個 Web 服務（Django + gunicorn）＋ 一個 Postgres 資料庫。
#
# 部署流程（Render 依此自動執行）：
#   build ：backend/build.sh
#           pip install + collectstatic
#           → migrate（建 Django 自身表 + tracked_movie）
#           → init_business_schema（在 Postgres 建 8 張業務表）
#           → seed_roles（建管理員/編輯者群組）
#           → ensure_admin（依環境變數建初始管理員帳號）
#   start ：gunicorn 起服務
#
# 說明：資料庫初始化放在 build.sh 而非 preDeployCommand，因為 Render 免費方案
# 不支援 preDeployCommand；build 階段已可存取 DATABASE_URL。
# 注意：Render 免費 Postgres 約 30 天到期，正式使用請升級付費方案。

databases:
  - name: muse-backend-db
    databaseName: muse
    user: muse
    plan: free

services:
  - type: web
    name: muse-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn movie_map_admin.wsgi:application"
    envVars:
      # 自動注入 Postgres 連線字串
      - key: DATABASE_URL
        fromDatabase:
          name: muse-backend-db
          property: connectionString
      # 自動產生安全的密鑰
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12.6"
      # 公開地圖網址（儀表板按鈕用），視需要修改
      - key: PUBLIC_MAP_URL
        value: "https://dandadany.github.io/muse-site/"
      # 初始管理員帳密：請在 Render 儀表板手動填入（sync:false 代表不寫進 repo）
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
